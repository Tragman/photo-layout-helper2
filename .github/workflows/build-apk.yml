      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Download Gradle 8.7
        shell: bash
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip

      - name: Build debug APK
        working-directory: photo-layout-helper-android-apk-v2
        shell: bash
        run: ../gradle-8.7/bin/gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: photo-layout-helper-debug-apk
          path: photo-layout-helper-android-apk-v2/app/build/outputs/apk/debug/app-debug.apk
